<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Offline — OGH SCD E-Tracker</title>
<style>
  body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;
    min-height:100vh;margin:0;background:#f8f9fa;text-align:center;padding:2rem;}
  .card{background:#fff;border-radius:12px;padding:2rem;box-shadow:0 2px 16px rgba(0,0,0,0.1);max-width:400px;}
  h1{color:#1a5276;margin-bottom:0.5rem;}
  p{color:#6c757d;}
  button{background:#1a5276;color:#fff;border:none;padding:0.75rem 2rem;
    border-radius:8px;cursor:pointer;font-size:1rem;margin-top:1rem;}
</style>
</head>
<body>
<div class="card">
  <div style="font-size:3rem">📶</div>
  <h1>You are offline</h1>
  <p>OGH SCD E-Tracker requires an internet connection to load patient data securely.</p>
  <p>Please check your connection and try again.</p>
  <button onclick="location.reload()">🔄 Try Again</button>
</div>
</body>
</html>
